<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анимация записи</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: transparent;
      overflow: hidden;
    }
    .eq-container {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(0, 123, 255, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }
    .bar {
      width: 6px;
      height: 10px;
      background-color: #007bff;
      border-radius: 3px;
      animation: bounce 1s infinite ease-in-out alternate;
    }
    .bar:nth-child(1) { animation-delay: 0.1s; }
    .bar:nth-child(2) { animation-delay: 0.4s; animation-duration: 0.8s; }
    .bar:nth-child(3) { animation-delay: 0.2s; animation-duration: 1.2s; }
    @keyframes bounce {
      0% { height: 10px; }
      100% { height: 35px; }
    }
  </style>
</head>
<body>
  <div class="eq-container">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</body>
</html>
